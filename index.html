<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçur Balonu - Okuma Takibi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div id="auth-area">
            <h1>🎈 Uçur Balonu</h1>
            <div class="form-box">
                <h2>Kayıt Ol</h2>
                <div id="role-selection-area" style="text-align: center; margin: 20px 0;">
                    <p>Hesap türünü seçiniz:</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button onclick="window.showRegisterForm('ogrenci')" style="background:#3498db; flex: 1;">Öğrenciyim</button>
                        <button onclick="window.showRegisterForm('admin')" style="background:#9b59b6; flex: 1;">Öğretmenim</button>
                    </div>
                </div>
                <div id="dynamic-register-form" style="display: none;">
                    <input type="hidden" id="rolSecimi">
                    <h3 id="form-title" style="margin-bottom: 15px;">Kayıt Formu</h3>
                    <input type="text" id="ogrenciAdSoyad" placeholder="Ad Soyad">
                    <input type="text" id="takmaAd" placeholder="Görünür İsim">
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="sinif" placeholder="Sınıf">
                        <input type="text" id="sube" placeholder="Şube">
                    </div>
                    <select id="sehir" onchange="window.ilceleriYukle()"></select>
                    <select id="ilce" disabled></select>
                    <select id="okul"></select>
                    <input type="email" id="email" placeholder="E-posta Adresi">
                    <input type="password" id="password" placeholder="Şifre Oluştur">
                    <button onclick="register()" id="reg-btn" style="background:#27ae60; margin-top: 10px;">Kaydı Tamamla</button>
                    <button onclick="resetRoleSelection()" style="background:#bdc3c7; font-size: 12px; margin-top: 5px;">Geri Dön</button>
                </div>
            </div>
            <div class="form-box">
                <h2>Giriş Yap</h2>
                <input type="email" id="loginEmail" placeholder="E-posta">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button onclick="login()">Giriş Yap</button>
            </div>
        </div>
        <div id="user-panel" style="display: none;">
            <header>
                <h1 id="welcome-msg">Selam!</h1>
                <button onclick="logout()" style="background:#e74c3c;">Çıkış</button>
            </header>
            <div class="sky"><div id="balloon-container"></div></div>
            <div class="stats">Balonun: <span id="display-height">0</span> m</div>
            <div class="form-box">
                <input type="number" id="sayfaSayisi" placeholder="Kaç sayfa okudun?">
                <button onclick="yukseklikArtir()">Uçur! 🚀</button>
            </div>
            <div class="leaderboard"><h3>Sınıf Sıralaması 🏆</h3><div id="leaderboard-list"></div></div>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
